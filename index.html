<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Where to Find Help · CalcBridge</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --teal:   #0D5C73;
  --teal2:  #1B7A96;
  --teal3:  #0a3f52;
  --orange: #D4622A;
  --gold:   #E8A020;
  --yellow: #FFD166;
  --bg:     #F4F7F9;
  --text:   #1A2A33;
  --muted:  #5A7080;
  --white:  #ffffff;
  --green:  #1a6b4a;
  --amber:  #92400e;
  --red:    #b91c1c;
  --border: #D0DDE5;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; min-height: 100vh; font-size: 16px; }

/* ── HEADER ── */
.header {
  background: var(--teal3); color: white;
  padding: 28px 24px 22px; text-align: center;
}
.header-eyebrow {
  font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--yellow); opacity: .85; margin-bottom: 8px;
}
.header-title {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(24px, 5vw, 32px); color: white; margin-bottom: 8px;
}
.header-sub {
  font-size: clamp(14px, 2.5vw, 16px); color: rgba(255,255,255,.7);
  font-weight: 300; max-width: 480px; margin: 0 auto; line-height: 1.6;
}

/* ── TABS ── */
.tab-row {
  display: flex; background: var(--teal3);
  border-top: 1px solid rgba(255,255,255,.1);
}
.tab-btn {
  flex: 1; padding: 14px 6px; border: none;
  background: transparent; color: rgba(255,255,255,.5);
  font-family: 'DM Sans', sans-serif; font-size: clamp(13px, 2vw, 15px);
  font-weight: 700; cursor: pointer; letter-spacing: .5px;
  border-bottom: 4px solid transparent;
  transition: all .15s; line-height: 1.3;
}
.tab-btn:hover { color: rgba(255,255,255,.85); }
.tab-btn.active {
  color: white;
  border-bottom-color: var(--orange);
  background: rgba(255,255,255,.08);
}
.tab-sub { font-weight: 400; font-size: clamp(11px, 1.8vw, 13px); opacity: .75; display: block; margin-top: 2px; }

/* ── MAIN ── */
.main { padding: 20px 18px; max-width: 680px; margin: 0 auto; }

/* ── PROBLEM GRID ── */
.problem-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
  gap: 10px; margin-bottom: 20px;
}
.prob-btn {
  background: white; border: 2px solid var(--border);
  border-radius: 12px; padding: 14px 6px;
  text-align: center; cursor: pointer;
  transition: all .15s; font-family: 'DM Sans', sans-serif;
}
.prob-btn:hover { border-color: var(--teal2); background: #ebf4f8; }
.prob-btn.active { border-color: var(--teal2); background: var(--teal3); color: white; }
.prob-num {
  font-size: clamp(20px, 3.5vw, 24px); font-weight: 700;
  color: var(--teal3); display: block; line-height: 1;
}
.prob-btn.active .prob-num { color: white; }
.prob-skill {
  font-size: clamp(11px, 1.8vw, 12px); color: var(--muted);
  margin-top: 4px; line-height: 1.3;
}
.prob-btn.active .prob-skill { color: rgba(255,255,255,.75); }

/* ── RESULT CARD ── */
.result-card {
  background: white; border-radius: 16px;
  border: 1px solid var(--border);
  overflow: hidden; display: none;
}
.result-card.show { display: block; }
.result-header {
  background: var(--teal3); padding: 20px 22px 18px;
}
.result-tag {
  font-size: 12px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--yellow); opacity: .85;
  margin-bottom: 6px;
}
.result-title {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(20px, 3.5vw, 26px); color: white; line-height: 1.25;
}
.result-body { padding: 20px 22px; display: flex; flex-direction: column; gap: 16px; }

.resource-row {
  display: flex; gap: 14px; align-items: flex-start;
}
.resource-icon {
  width: 38px; height: 38px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0; margin-top: 2px;
}
.icon-ff  { background: #e0f0f8; }
.icon-cbc { background: #e8f5ef; }
.icon-app { background: #fff3e0; }
.icon-gap { background: #fef2f2; }
.resource-content { flex: 1; }
.resource-label {
  font-size: 12px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 4px;
}
.resource-text { font-size: clamp(14px, 2.2vw, 16px); color: var(--text); line-height: 1.6; }
.resource-text strong { color: var(--teal3); }
.resource-text.gap { color: var(--red); }
.resource-text.partial { color: var(--amber); }
.resource-link {
  display: inline-block; margin-top: 10px;
  background: var(--orange); color: white;
  font-size: clamp(13px, 2vw, 15px); font-weight: 700; padding: 8px 18px;
  border-radius: 8px; text-decoration: none;
}
.resource-link:hover { background: #b8501f; }

/* ── COVERAGE PILL ── */
.cov-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 13px; border-radius: 14px;
  font-size: clamp(12px, 2vw, 14px); font-weight: 700; margin-top: 2px;
}
.cov-full { background: #e8f5ef; color: var(--green); }
.cov-part { background: #fffbeb; color: var(--amber); }
.cov-gap  { background: #fef2f2; color: var(--red); }

/* ── INTEGRAL BADGE ── */
.int-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--teal3); color: var(--yellow);
  font-size: clamp(12px, 2vw, 14px); font-weight: 700; padding: 5px 13px;
  border-radius: 14px;
}

/* ── DIVIDER ── */
.divider { border: none; border-top: 1px solid var(--border); }

/* ── PLACEHOLDER ── */
.placeholder {
  text-align: center; padding: 40px 20px;
  color: var(--muted); font-size: clamp(15px, 2.5vw, 17px);
}
.placeholder-icon { font-size: 40px; margin-bottom: 12px; }
.placeholder-text { font-style: italic; line-height: 1.6; }

@media (max-width: 520px) {
  .problem-grid { grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 8px; }
  .main { padding: 16px 14px; }
  .result-header { padding: 16px 18px 14px; }
  .result-body { padding: 16px 18px; gap: 14px; }
}

/* ── AI PROMPTS SECTION ── */
.ai-section {
  border: 2px solid #c7e0ea;
  border-radius: 14px;
  overflow: hidden;
}
.ai-toggle {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  background: #e8f4f9; border: none; padding: 14px 18px;
  font-family: 'DM Sans', sans-serif; font-size: clamp(14px, 2.2vw, 15px);
  font-weight: 700; color: var(--teal3); cursor: pointer; text-align: left;
  transition: background .15s;
}
.ai-toggle:hover { background: #d5eaf4; }
.ai-toggle-icon { font-size: 18px; transition: transform .2s; flex-shrink: 0; }
.ai-toggle.open .ai-toggle-icon { transform: rotate(180deg); }
.ai-body { padding: 0 18px 18px; display: none; }
.ai-body.open { display: block; }
.ai-intro {
  font-size: clamp(13px, 2vw, 14px); color: var(--muted);
  line-height: 1.55; padding: 12px 0 14px; border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
}
.prompt-block { margin-bottom: 12px; }
.prompt-type {
  display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; padding: 3px 10px; border-radius: 8px; margin-bottom: 7px;
}
.type-explain { background: #e0f0f8; color: #0a3f52; }
.type-explore { background: #e8f5ef; color: #1a6b4a; }
.type-practice { background: #fff3e0; color: #92400e; }
.prompt-row {
  display: flex; gap: 10px; align-items: flex-start;
  background: #f8fafc; border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px;
}
.prompt-text {
  flex: 1; font-size: clamp(13px, 2vw, 14px); color: var(--text);
  line-height: 1.6; font-style: italic;
}
.copy-btn {
  flex-shrink: 0; background: var(--teal3); color: white;
  border: none; border-radius: 7px; padding: 5px 11px;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700;
  cursor: pointer; white-space: nowrap; transition: background .15s; margin-top: 2px;
}
.copy-btn:hover { background: var(--teal2); }
.copy-btn.copied { background: var(--green); }
.followup-card {
  background: var(--teal3); border-radius: 10px; padding: 14px 16px; margin-top: 14px;
}
.followup-label {
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--yellow); margin-bottom: 8px;
}
.followup-list {
  list-style: none; display: flex; flex-direction: column; gap: 6px;
}
.followup-list li {
  font-size: clamp(13px, 2vw, 14px); color: rgba(255,255,255,.85); line-height: 1.4;
}
.followup-list li::before { content: '→ '; color: var(--yellow); font-weight: 700; }
</style>
</head>

      app: { label: 'Open Trig Equations Practice', href: 'https://saccalcbridgetrigequations.netlify.app/' },
      sym: true,
      prompts: {
        explain: "Can you explain how to solve 2cos(x) = √3 on the interval [0, 2π)? Walk me through each step: isolate the trig function, find the reference angle, identify the correct quadrants, and write the solutions.",
        explore: "When I solve 2x = 4, I get exactly one answer. But when I solve 2cos(x) = 1, there are multiple solutions. Why do trig equations produce multiple solutions?",
        practice: "I need to solve √3·tan(x) + 1 = 0 on [0, 2π). Can you coach me without giving me the answer? Ask me what the first step is, then guide me through the reference angle, the correct quadrants, and writing the solutions.",
        followup: ["Can you say that differently?", "Show me another equation I can practice with.", "Can you check my answers: x = 5π/6 and x = 11π/6?", "How would I write the general solution using + 2πn?"]
      },
    },
    {
      skill: 'Sketch the graph of a trig function',
      short: 'Graph Trig',
      cov: 'full',
      ff: null,
      cbc: '<strong>OpenStax 1.3</strong> — Trigonometric Functions',
      app: null,
      sym: true,
    },
  ],
};

let currentTest = 'A';
let currentProb = null;

function selectTest(test, btn) {
  currentTest = test;
  currentProb = null;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
  hideResult();
}

function renderGrid() {
  const grid = document.getElementById('problemGrid');
  const probs = DATA[currentTest];
  grid.innerHTML = '';
  probs.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'prob-btn';
    btn.id = 'pb-' + i;
    btn.onclick = () => selectProblem(i);
    btn.innerHTML = `<span class="prob-num">${i + 1}</span><span class="prob-skill">${p.short}</span>`;
    grid.appendChild(btn);
  });
}

function selectProblem(i) {
  currentProb = i;
  document.querySelectorAll('.prob-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pb-' + i).classList.add('active');
  showResult(DATA[currentTest][i], i);
}

function hideResult() {
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('placeholder').style.display = 'block';
}

function covLabel(cov) {
  if (cov === 'full') return '<span class="cov-pill cov-full">✓ Fully covered in the course</span>';
  if (cov === 'part') return '<span class="cov-pill cov-part">⚠ Partially covered — see notes below</span>';
  return '<span class="cov-pill cov-gap">⚠ Coverage gap — additional resource coming</span>';
}

function showResult(p, i) {
  const testName = { A: 'Diagnostic A — Algebra', B: 'Diagnostic B — Analytic Geometry', C: 'Diagnostic C — Functions', D: 'Diagnostic D — Trigonometry' };
  document.getElementById('rTag').textContent = `${testName[currentTest]} · Problem ${i + 1}`;
  document.getElementById('rTitle').textContent = p.skill;

  let html = '';

  // Coverage pill + integral badge
  html += `<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">${covLabel(p.cov)}`;
  if (p.sym) html += `<span class="int-badge">∫ CalcBridge skill</span>`;
  html += `</div>`;

  // Divider
  html += `<hr class="divider">`;

  // Section 2 — Foundational Fluency
  if (p.ff) {
    html += `<div class="resource-row">
      <div class="resource-icon icon-ff">📘</div>
      <div class="resource-content">
        <div class="resource-label">Section 2 · Foundational Fluency</div>
        <div class="resource-text">${p.ff}</div>
      </div>
    </div>`;
  }

  // Section 3 — CBC
  if (p.cbc) {
    html += `<div class="resource-row">
      <div class="resource-icon icon-cbc">📗</div>
      <div class="resource-content">
        <div class="resource-label">Section 3 · Calculus Before Calculus</div>
        <div class="resource-text">${p.cbc}</div>
      </div>
    </div>`;
  }

  // Neither section covered
  if (!p.ff && !p.cbc && !p.gap) {
    html += `<div class="resource-row">
      <div class="resource-icon icon-gap">⚠️</div>
      <div class="resource-content">
        <div class="resource-label">Coverage note</div>
        <div class="resource-text gap">This skill is not yet fully addressed in the current course materials. Check back for updates.</div>
      </div>
    </div>`;
  }

  if (p.gap) {
    html += `<div class="resource-row">
      <div class="resource-icon icon-gap">⚠️</div>
      <div class="resource-content">
        <div class="resource-label">Coverage note</div>
        <div class="resource-text gap">This skill is not currently covered in either course section. A dedicated practice resource is being developed for CalcBridge.</div>
      </div>
    </div>`;
  }

  // App link
  if (p.app) {
    html += `<div class="resource-row">
      <div class="resource-icon icon-app">⚡</div>
      <div class="resource-content">
        <div class="resource-label">Interactive resource</div>
        <div class="resource-text">
          ${p.app.href !== '#'
            ? `<a class="resource-link" href="${p.app.href}">${p.app.label} →</a>`
            : `<span style="color:var(--muted);font-style:italic">${p.app.label}</span>`
          }
        </div>
      </div>
    </div>`;
  }

  // AI prompts section
  if (p.prompts) {
    const pr = p.prompts;
    html += `<hr class="divider">
    <div class="ai-section">
      <button class="ai-toggle" onclick="toggleAI(this)" aria-expanded="false">
        💬 Talk to an AI About This Topic
        <span class="ai-toggle-icon">▾</span>
      </button>
      <div class="ai-body">
        <p class="ai-intro">Copy any prompt below and paste it into ChatGPT, Claude, Gemini, or any AI chatbot. Each prompt is designed to give you a different kind of support — choose the one that fits where you are right now.</p>

        <div class="prompt-block">
          <div class="prompt-type type-explain">📖 Explain It</div>
          <div class="prompt-row">
            <span class="prompt-text">${pr.explain}</span>
            <button class="copy-btn" onclick="copyPrompt(this,'explain')">Copy</button>
          </div>
        </div>

        <div class="prompt-block">
          <div class="prompt-type type-explore">🔍 Explore the Concept</div>
          <div class="prompt-row">
            <span class="prompt-text">${pr.explore}</span>
            <button class="copy-btn" onclick="copyPrompt(this,'explore')">Copy</button>
          </div>
        </div>

        <div class="prompt-block">
          <div class="prompt-type type-practice">🎯 Practice with Coaching</div>
          <div class="prompt-row">
            <span class="prompt-text">${pr.practice}</span>
            <button class="copy-btn" onclick="copyPrompt(this,'practice')">Copy</button>
          </div>
        </div>

        <div class="followup-card">
          <div class="followup-label">💬 Follow-up prompts to keep the conversation going</div>
          <ul class="followup-list">
            ${pr.followup.map(f => `<li>${f}</li>`).join('')}
          </ul>
        </div>
      </div>
    </div>`;
  }

  document.getElementById('rBody').innerHTML = html;
  document.getElementById('resultCard').classList.add('show');
  document.getElementById('placeholder').style.display = 'none';
}

function toggleAI(btn) {
  const body = btn.nextElementSibling;
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  btn.classList.toggle('open', !isOpen);
  btn.setAttribute('aria-expanded', String(!isOpen));
}

function copyPrompt(btn, key) {
  const text = DATA[currentTest][currentProb].prompts[key];
  const finish = () => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(finish).catch(() => fallbackCopy(text, finish));
  } else {
    fallbackCopy(text, finish);
  }
}

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
  if (cb) cb();
}

// Init
renderGrid();
</script>
</body>
</html>
